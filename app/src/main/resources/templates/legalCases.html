<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>LegalCases</title>
</head>
<body>

<th:block th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">
    <title th:text="#{header.legalCases}">LegalCases</title>
    <section>
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-people-fill me-2"></i><span th:text="#{header.legalCases}">LegalCases</span></h2>
            <div>
                Filter:
                <form action="/legalCases" method="get">
                    <input type="text" name="title" th:value="${searchCriteria != null ? searchCriteria.getTitle() : ''}"
                           placeholder="title">
                    <input type="text" name="description"
                           th:value="${searchCriteria != null ? searchCriteria.getDescription():''}" placeholder="description">
                    <input type="text" name="amount" th:value="${searchCriteria != null ? searchCriteria.getAmount():''}"
                           placeholder="amount">
                    <input type="text" name="status" th:value="${searchCriteria != null ? searchCriteria.getStatus():''}"
                           placeholder="status">

                    <input type="submit" value="Search">
                </form>
            </div>
            <div>
                <a th:href="@{/legalCases}" class="btn btn-outline-secondary me-2">
                    <i class="bi bi-arrow-repeat me-1"></i><span th:text="#{legalCases.showAll}">Show All</span>
                </a>
                <a href="/LegalCases/add" class="btn btn-success">
                    <i class="bi bi-plus-circle me-1"></i><span th:text="#{legalCases.add}">Add LegalCases</span>
                </a>
            </div>
        </div>

        <div th:if="${legalCases == null || legalCases.isEmpty()}" class="alert alert-info text-center">
            <i class="bi bi-info-circle me-1"></i><span th:text="#{legalCases.empty}">No legalCases found.</span>
        </div>

        <div th:if="${legalCases != null && !legalCases.isEmpty()}" class="table-responsive">
            <table class="table table-striped table-hover align-middle">
                <thead class="table-dark">
                <tr>
                    <th th:text="#{form.picture}">Picture</th>
                    <th th:text="#{table.id}">Id</th>
                    <th th:text="#{form.title}">Title</th>
                    <th th:text="#{form.description}">Description</th>
                    <th th:text="#{table.amount}">Amount</th>
                    <th th:text="#{table.status}">Status</th>
                </tr>
                </thead>
                <tbody>
                <tbody>
                <tbody>
                <tr th:each="legalCase : ${legalCases.content}">
                    <td>
                    <td>
                        <img th:if="${legalCase.pictureName != null && !legalCase.pictureName.isEmpty()}"
                             th:src="@{/image/get(picName=${legalCase.pictureName})}"
                             style="width: 80px; height: 80px; object-fit: cover; border-radius: 5px; border: 1px solid #ddd;"
                             alt="Photo">

                        <img th:if="${legalCase.pictureName == null || legalCase.pictureName.isEmpty()}"
                             th:src="@{/images/img.png}"
                             style="width: 80px; height: 80px; object-fit: cover; border-radius: 5px;"
                             alt="Default">
                    </td>




                    <td th:text="${legalCase.id}"></td>

                    <td th:text="${legalCase.title}"></td>

                    <td th:text="${legalCase.description}"></td>
                    <td th:text="${legalCase.amount}"></td>

                    <td th:text="${legalCase.status}"></td>

                    <td>
                        <a th:href="@{/LegalCases(userId=${legalCase.user?.id})}"
                           class="badge bg-info text-decoration-none"
                           th:text="${legalCase.user?.name}">
                        </a>
                    </td>


                    <td>
                        <a th:href="@{/LegalCases/edit/{id}(id=${legalCase.id})}" class="btn btn-danger btn-sm">Edit</a>
                        <a th:href="@{/legalCases/delete(id=${legalCase.id})}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('Are you sure you want to delete this legalCase?');">
                            <i class="bi bi-trash"></i> Delete
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>

            <nav class="mt-4">
                <ul class="pagination justify-content-center">

                    <!-- Previous -->
                    <li class="page-item" th:classappend="${legalCases.first} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/legalCases(size=${legalCases.size}, page=${legalCases.number - 1})}">&laquo;</a>
                    </li>

                    <!-- Page numbers -->
                    <li th:each="pageNumber : ${pageNumbers}"
                        class="page-item"
                        th:classappend="${pageNumber == legalCases.number + 1} ? 'active'">
                        <a class="page-link"
                           th:href="@{/legalCases(size=${legalCases.size}, page=${pageNumber - 1})}"
                           th:text="${pageNumber}"></a>
                    </li>

                    <!-- Next -->
                    <li class="page-item" th:classappend="${legalCases.last} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/legalCases(size=${legalCases.size}, page=${legalCases.number + 1})}">&raquo;</a>
                    </li>

                </ul>
            </nav>
        </div>
    </section>
</th:block>

</body>
</html>
