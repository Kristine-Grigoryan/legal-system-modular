<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add LegalCase</title>
</head>
<body>

<th:block th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">
    <title th:text="#{legalCases.add}">Add LegalCase</title>
    <section>
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-header bg-success text-white">
                        <h4 class="mb-0"><i class="bi bi-person-plus-fill me-2"></i><span th:text="#{legalCases.add}">Add LegalCase</span></h4>
                    </div>
                    <div class="card-body p-4">
                        <form action="/legalCases/add" method="post" enctype="multipart/form-data">
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label for="title" class="form-label" th:text="#{form.title}">Title</label>
                                    <input type="text" class="form-control" id="title" name="title" th:placeholder="#{form.title}">
                                </div>
                                <div class="col-md-6">
                                    <label for="description" class="form-label" th:text="#{form.description}">Description</label>
                                    <input type="text" class="form-control" id="description" name="description" th:placeholder="#{form.description}">
                                </div>
                            </div>
                            <div class="mb-3">
                                <label for="amount" class="form-label" th:text="#{table.amount}">Amount</label>
                                <input type="number" class="form-control" id="amount" name="amount" th:placeholder="#{table.amount}">
                            </div>
                            <div class="mb-3">
                                <label for="status" class="form-label" th:text="#{table.status}">Status</label>
                                <select class="form-select" id="status" name="status">
                                    <option th:each="status : ${statuses}"
                                            th:value="${status}"
                                            th:text="${status}">StatusName</option>
                                </select>
                            </div>


                            <div class="mb-3">
                                <label for="user" class="form-label" th:text="#{table.user}">User</label>
                                <select class="form-select" id="user" name="user.id">
                                    <option th:each="user : ${users}"
                                            th:value="${user.id}"
                                            th:text="${user.name}"></option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label for="pic" class="form-label" th:text="#{form.picture}">Picture</label>
                                <input type="file" class="form-control" id="pic" name="pic" accept="image/*">
                            </div>
                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-success">
                                    <i class="bi bi-check-circle me-1"></i><span th:text="#{form.submit}">Submit</span>
                                </button>
                                <a href="/legalCases" class="btn btn-outline-secondary">
                                    <i class="bi bi-x-circle me-1"></i><span th:text="#{form.cancel}">Cancel</span>
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>
</th:block>

</body>
</html>
