<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add CourtSession</title>
</head>
<body>

<th:block th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">
    <title th:text="#{courtSessions.add}">Add CourtSessions</title>
    <section>
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow">
                    <div class="card-header bg-success text-white">
                        <h4 class="mb-0"><i class="bi bi-plus-circle me-2"></i><span th:text="#{courtSessions.add}">Add CourtSession</span></h4>
                    </div>
                    <div class="card-body p-4">
                        <form action="/courtSessions/add" method="post">
                            <div class="mb-3">
                                <label for="SessionDate" class="form-label" th:type= "#{form.sessionDate}">Session Date</label>
                                <input type="text" class="form-control" id="sessionDate" name="sessionDate" th:placeholder="#{form.sessionDate}">
                            </div>
                            <div class="mb-3">
                                <label for="cartroom" class="form-label" th:text="#{table.courtroom}">Courtroom</label>
                                <input type="text" class="form-control" id="cartroom" name="cartroom" th:placeholder="#{table.courtroom}">
                            </div>

                    <div class="mb-3">
                        <label for="notes" class="form-label" th:text="#{table.notes}">Notes</label>
                        <input type="text" class="form-control" id="notes" name="notes" th:placeholder="#{table.notes}">
                    </div>



                    <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-success">
                                    <i class="bi bi-check-circle me-1"></i><span th:text="#{form.submit}">Submit</span>
                                </button>
                                <a href="/courtSessions" class="btn btn-outline-secondary">
                                    <i class="bi bi-x-circle me-1"></i><span th:text="#{form.cancel}">Cancel</span>
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>
</th:block>

</body>
</html>
