<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Payments</title>
</head>
<body>

<th:block th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">
    <title th:text="#{header.payments}">Payments</title>
    <section>
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-book-fill me-2"></i><span th:text="#{header.payments}">Payments</span></h2>
            <a href="/payments/add" class="btn btn-success">
                <i class="bi bi-plus-circle me-1"></i><span th:text="#{payments.add}">Add Payments</span>
            </a>
        </div>

        <div th:if="${payments == null || payments.isEmpty()}" class="alert alert-info text-center">
            <i class="bi bi-info-circle me-1"></i><span th:text="#{payments.empty}">No payments found.</span>
        </div>

        <div th:if="${payments != null && !payments.isEmpty()}" class="table-responsive">
            <table class="table table-striped table-hover align-middle">
                <thead class="table-dark">
                <tr>
                    <th th:text="#{table.id}">Id</th>
                    <th th:text="#{form.amount}">Amount</th>
                    <th th:text="#{form.paidDate}">PaidDate</th>
                    <th th:text="#{table.method}">Method</th>
                    <th th:text="#{table.action}">Action</th>

                </tr>
                </thead>
                <tbody>
                <tr th:each="Payment : ${Payments}">
                    <td>
                    </td>
                <tr th:each="c : ${payments}">
                    <td th:text="${p.id}"></td>
                    <td th:text="${p.paidDate}"></td>
                    <td th:text="${p.method}"></td>
                    <td>
                    </td>
                    <a th:each="case : ${payment.getCase()}"
                       th:href="@{/payment(caseId=${case.id})}"
                       class="badge bg-secondary text-decoration-none" th:text="${case.name}"></a>

                </tr>
                </tbody>
                <table>
                        <a th:href="@{/payments/delete(id=${p.id})}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('Are you sure you want to delete this payment?');">
                            <i class="bi bi-trash me-1"></i><span th:text="#{action.delete}">Delete</span>
                        </a>

                </table>
            </table>
        </div>
    </section>
</th:block>

</body>
</html>
