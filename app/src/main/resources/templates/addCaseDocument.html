<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add CaseDocumens</title>
</head>
<body>

<th:block th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">
    <title th:text="#{caseDocuments.add}">Add CaseDocuments</title>
    <section>
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-header bg-success text-white">
                        <h4 class="mb-0"><i class="bi bi-person-plus-fill me-2"></i><span th:text="#{caseDocuments.add}">Add CaseDocuments</span></h4>
                    </div>
                    <div class="card-body p-4">
                        <form action="/caseDocuments/add" method="post" enctype="multipart/form-data">
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label for="fileName" class="form-label" th:text="#{form.fileName}">FileName</label>
                                    <input type="text" class="form-control" id="fileName" name="fileName" th:placeholder="#{form.fileName}">
                                </div>
                                <div class="col-md-6">
                                    <label for="filePath" class="form-label" th:text="#{form.filePath}">FilePath</label>
                                    <input type="text" class="form-control" id="filePath" name="FilePath" th:placeholder="#{form.filePath}">
                                </div>
                            </div>
                            <div class="mb-3">
                                <label for="fileType" class="form-label" th:text="#{form.fileType}">FileType</label>
                                <input type="text" class="form-control" id="fileType" name="fileType" th:placeholder="#{form.fileType}">
                             </div>
                            <div class="mb-3">
                                <label for="uploadedAt" class="form-label" th:text="#{table.uploadedAt}">UploadedAt</label>
                                <input type="number" class="form-control" id="uploadedAt" name="fileType" th:placeholder="#{table.uploadedAt}">
                            </div>

                            <div class="mb-3">
                                <label for="case" class="form-label" th:text="#{table.case}">Case</label>
                                <select class="form-select" id="case" name="case.id">
                                    <option th:each="case : ${cases}"
                                            th:value="${case.id}"
                                            th:text="${case.name}"></option>
                                </select>
                            </div>

                            <div class="d-flex gap-2">
                                <button type="submit" class="btn btn-success">
                                    <i class="bi bi-check-circle me-1"></i><span th:text="#{form.submit}">Submit</span>
                                </button>
                                <a href="/caseDocuments" class="btn btn-outline-secondary">
                                    <i class="bi bi-x-circle me-1"></i><span th:text="#{form.cancel}">Cancel</span>
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>
</th:block>

</body>
</html>
