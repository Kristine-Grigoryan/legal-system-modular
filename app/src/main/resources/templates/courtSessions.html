<th:block th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">
    <title th:text="#{header.courtSessions}">CourtSessions</title>
    <section>
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-book-fill me-2"></i><span th:text="#{header.courtSessions}">CourtSessions</span></h2>
            <a href="/courtSessions/add" class="btn btn-success">
                <i class="bi bi-plus-circle me-1"></i><span th:text="#{courtSessions.add}">Add CourtSessions</span>
            </a>
        </div>

        <div th:if="${courtSessions == null || courtSessions.isEmpty()}" class="alert alert-info text-center">
            <i class="bi bi-info-circle me-1"></i><span th:text="#{courtSessions.empty}">No courtSessions found.</span>
        </div>

        <div th:if="${courtSessions != null && !courtSessions.isEmpty()}" class="table-responsive">
            <table class="table table-striped table-hover align-middle">
                <thead class="table-dark">
                <tr>
                    <th th:text="#{table.id}">Id</th>
                    <th th:text="#{form.sessionDate}">SessionDate</th>
                    <th th:text="#{table.courtroom}">Courtroom</th>
                    <th th:text="#{table.notes}">Notes</th>
                    <th th:text="#{table.action}">Action</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="c : ${courtSessions}">
                    <td th:text="${c.id}"></td>
                    <td th:text="${c.sessionDate}"></td>
                    <td th:text="${c.courtroom}"></td>
                    <td th:text="${c.notes}"></td>
                    <td th:text="${c.legalCase?.id}"></td>
                    <td>

                        <a th:href="@{/courtSessions/delete(id=${c.id})}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('Are you sure you want to delete this courtSession?');">
                            <i class="bi bi-trash me-1"></i><span th:text="#{action.delete}">Delete</span>
                        </a>

            </table>
        </div>
    </section>
</th:block>

</body>
</html>
