spring:
  application:
    name: legal-system
  datasource:
    url: jdbc:mysql://localhost:3306/legal_system
    username: ${DB_USERNAME :root}
    password: ${DB_PASSWORD :root}
    driver-class-name: com.mysql.jdbc.Driver
  jpa:
    show-sql: true
  servlet:
    multipart:
      max-file-size: 10MB

server:
  port: 8085

legal:
  system:
    upload:
      image:
        directory:
          path: G:\Users\User\IdeaPro\src\main\resources\static\images\img.png

logging:
  file:
    name: G:\Users\User\IdeaProjects\legal-system\log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30
  level:
    root: INFO
    org.hibernate.SQL: DEBUG
    com.example.legalsystem.controller: DEBUG